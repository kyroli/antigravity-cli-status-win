name: Rust Online Build

on:
  push:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Rust Cache
      uses: swatinem/rust-cache@v2

    - name: Build Release Binary
      run: cargo build --release

    - name: Generate build provenance attestation (statusline)
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: 'target/release/statusline.exe'

    - name: Commit and Push binary back to repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        copy target\release\statusline.exe .\statusline.exe
        copy target\release\statusline.exe .\title.exe
        git add statusline.exe title.exe
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore(build): auto-compiled release binaries" && git push)
      shell: cmd
